# These settings were set by the catalyst build script that automatically
# built this stage.
# Please consult /usr/share/portage/config/make.conf.example for a more
# detailed example.
COMMON_FLAGS="-O3 -pipe -march=znver5 -mno-prefetchi -mshstk --param=l1-cache-line-size=64 --param=l1-cache-size=48 --param=l2-cache-size=1024"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# NOTE: This stage was built with the bindist Use flag enabled

# This sets the language of build output to English.
# Please keep this setting intact when reporting bugs.
LC_MESSAGES=C.UTF-8

PORTDIR="/var/db/repos/gentoo"
DISTDIR="/var/cache/distfiles"
PKGDIR="/var/cache/binpkgs"

GENTOO_MIRRORS="https://mirrors.tuna.tsinghua.edu.cn/gentoo"

MAKEOPTS="-j8 -l8"

PORTAGE_NICENESS="15"

INPUT_DEVICES="synaptics libinput"

VIDEO_CARDS="amdgpu radeonsi virgl"

ACCEPT_LICENSE="*"

ACCEPT_KEYWORDS="~amd64"

CPU_FLAGS_X86="aes avx avx2 avx512_bf16 avx512_bitalg avx512_vbmi2 avx512_vnni avx512_vp2intersect avx512_vpopcntdq avx512bw avx512cd avx512dq avx512f avx512ifma avx512vbmi avx512vl avx_vnni bmi1 bmi2 f16c fma3 mmx mmxext pclmul popcnt rdrand sha sse sse2 sse3 sse4_1 sse4_2 sse4a ssse3 vpclmulqdq"

GRUB_PLATFORMS="efi-64 pc"

L10N="en en-US"

RUBY_TARGETS="ruby25 ruby26 ruby30 ruby31 ruby32"

PYTHON_TARGETS="python3_8 python3_9 python3_10 python3_11 python3_12 python3_13 python3_14"

PYTHON_SINGLE_TARGET="python3_13"

LUA_TARGETS="lua5-1 lua5-3 luajit"

CBUILD="x86_64-pc-linux-gnu"

CHOST="x86_64-pc-linux-gnu"

QEMU_SOFTMMU_TARGETS="amd x86_64"

QEMU_USER_TARGETS="x86_64"

MICROCODE_SIGNATURES="-S"

LLVM_TARGETS="AMDGPU WebAssembly"

RUSTFLAGS="-C target-cpu=native -C opt-level=3"

USE="X a52 aac aacs acl alsa amdgpu aspell bash-completion bluetooth boost
     branding c-ares caps clippy contrib cpudetection crypt dav1d dbus dnssec
