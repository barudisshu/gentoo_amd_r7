     ibus ico idn initramfs int64 java jemalloc jpeg jpeg2k json kerberos kms
     libass libav-aac libcaca libdrm libinput libnotify libvirt libvirtd llvm
     lm-sensors lto lz4 lzma lzo mariadb math matroska mime minizip mp3 mp4
     mpeg nano-syntax ncurses networkmanager nftables nls nodejs numa ogg
     opencl opencv openh264 openssl osc pango pcap pdf pie pipewire
     pipewire-alsa pkcs11 png python qemu recode rust rust-analyzer rust-src
     rustfmt samba savedconfig screencast sdlgfx server simplexml slang smp
     snmp sockets sound sound-server spell spice ssh suid svg swiftshader
     symlink system-lz4 system-pipewire systemd tahoma theora timezone tkip
